<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/svg" href="/tcgzone/assets/logos/logo/transparent-image.png">  

    <title>TCG Marketplace | Login</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Figtree -->
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="/tcgzone/assets/css/shared.css">
    <link rel="stylesheet" href="login.css">

</head>

<body>

    <div class="container">

        <!-- LEFT SIDE -->
        <div class="left-section">

            <h2 class="logo"><a href="/tcgzone/customer/Landing Page/index.php">tcgzone</a></h2>

            <div class="form-container">

                <h1>Sign in</h1>

                <p class="subtext">
                    Don't have an account?
                </p>

                <p class="register-link">
                    You can
                    <a href="/tcgzone/customer/Signup Page/signup.html">register here!</a>
                </p>

                <!-- Login Form -->
                <form action="login.php" method="POST">

                    <!-- Email -->
                    <label>Email</label>

                    <div class="input-box">

                        <img src="/tcgzone/assets/images/login_signin page/email.svg" alt="Email">

                        <input
                            type="email"
                            name="email"
                            placeholder="Enter your email address"
                            required>

                    </div>

                    <!-- Password -->
                    <label>Password</label>

                    <div class="input-box">

                        <img src="/tcgzone/assets/images/login_signin page/password.svg" alt="Password">

                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your Password"
                            required>

                        <i class="fa-regular fa-eye" id="togglePassword"></i>

                    </div>

                    <!-- Remember -->
                    <div class="options">

                        <label class="remember">

                            <input type="checkbox">

                            Remember me

                        </label>

                        <!-- <a href="#">
                            Forgot Password ?
                        </a> -->

                    </div>

                    <!-- Button -->
                    <button type="submit">

                        Login

                    </button>

                </form>

            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="right-section">

            <img src="/tcgzone/assets/images/login_signin page/LOGINimg.png" alt="Background">
<!-- 
            <div class="overlay-text">

                <h1>Sign in to tcgzone</h1>

                <p>Lorem Ipsum is simply</p>

            </div> -->

        </div>

    </div>

    <!-- JavaScript -->
    <script src="login.js"></script>

</body>

</html>
