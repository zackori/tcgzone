<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/svg"
      href="/tcgzone/assets/logos/logo/transparent-image.png"
    />

    <title>TCG Marketplace | Forgot Password</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="/tcgzone/assets/css/shared.css" />
    <link rel="stylesheet" href="forgot-password.css" />
  </head>

  <body>
    <div class="container">
      <!-- LEFT SIDE -->
      <div class="left-section">
        <h2 class="logo">
          <a href="/tcgzone/customer/Landing Page/index.php">tcgzone</a>
        </h2>

        <div class="form-container">
          <h1>Forgot Password</h1>

          <p class="subtext">
            Enter your email address and we'll send you a
            <span class="highlight">verification code</span> to reset your
            password.
          </p>

          <div
            id="feedback-message"
            class="login-error hidden"
            role="alert"
            aria-live="polite"
          >
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="feedback-text"
              >Enter your email address to receive a verification code.</span
            >
          </div>

          <div id="email-step">
            <form id="email-form">
              <label for="email">Email</label>
              <div class="input-box">
                <img
                  src="/tcgzone/assets/images/login_signin page/email.svg"
                  alt="Email"
                />
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="Enter your email address"
                  required
                />
              </div>
              <button type="submit">Send Verification Code</button>
            </form>
          </div>

          <div id="code-step" class="hidden mt-5">
            <p class="subtext2">
              A demo verification code has been generated below. Type it exactly
              to continue.
            </p>
            <div id="demo-code" class="demo-code"></div>
            <form id="code-form">
              <label for="verification-code">Verification Code</label>
              <div class="input-box">
                <img
                  src="/tcgzone/assets/images/login_signin page/email.svg"
                  alt="Code"
                />
                <input
                  type="text"
                  id="verification-code"
                  name="verification_code"
                  placeholder="Enter verification code"
                  inputmode="numeric"
                  pattern="\d{6}"
                  maxlength="6"
                  required
                />
              </div>
              <button type="submit">Verify Code</button>
            </form>
          </div>

          <div id="reset-step" class="hidden">
            <p class="subtext">Choose a new password for your account.</p>
            <form id="reset-form">
              <label for="new-password">New Password</label>
              <div class="input-box">
                <img
                  src="/tcgzone/assets/images/login_signin page/password.svg"
                  alt="Password"
                />
                <input
                  type="password"
                  id="new-password"
                  name="password"
                  placeholder="Enter new password"
                  minlength="8"
                  required
                />
              </div>
              <label for="confirm-password">Retype New Password</label>
              <div class="input-box">
                <img
                  src="/tcgzone/assets/images/login_signin page/password.svg"
                  alt="Confirm Password"
                />
                <input
                  type="password"
                  id="confirm-password"
                  name="confirm_password"
                  placeholder="Retype new password"
                  minlength="8"
                  required
                />
              </div>
              <button type="submit">Update Password</button>
            </form>
          </div>

          <div
            id="success-message"
            class="success-message hidden"
            role="status"
            aria-live="polite"
          ></div>
        </div>
      </div>

      <!-- RIGHT SIDE -->

      <div class="right-section">
        <img
          src="/tcgzone/assets/images/login_signin page/LOGINimg.png"
          alt="Background"
        />
        <!-- 
            <div class="overlay-text">

                <h1>Sign in to tcgzone</h1>

                <p>Lorem Ipsum is simply</p>

            </div> -->
      </div>
    </div>

    <!-- JavaScript -->
    <!-- Toast notification -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="forgot-password.js"></script>
  </body>
</html>
